<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JindexNova | Secured Access Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Space+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            background-color: #0c0c0c;
            color: #f0f0f0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Yumuşak Arka Plan Dalgalanması */
        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, #2a2a2a 0%, #0c0c0c 70%);
            opacity: 0.6;
            animation: drift 20s linear infinite;
            z-index: 1;
        }

        @keyframes drift {
            from { transform: translate(-25%, -25%) rotate(0deg); }
            to { transform: translate(-25%, -25%) rotate(360deg); }
        }

        /* Ana Panel */
        .container {
            width: 480px;
            padding: 60px;
            background: rgba(20, 20, 20, 0.8);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(20px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 0.8rem;
            color: #888;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .separator {
            width: 40px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.1);
            margin: 30px auto;
        }

        /* Şifre Giriş Alanı */
        .input-group {
            margin-bottom: 30px;
        }

        input[type="password"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px;
            border-radius: 12px;
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="password"]::placeholder {
            color: #555;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0;
        }

        input[type="password"]:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Discord Bölümü */
        .discord-box {
            font-size: 0.75rem;
            color: #777;
            font-weight: 300;
            line-height: 1.5;
        }

        .discord-box a {
            color: #bbb;
            text-decoration: none;
            font-weight: 400;
            transition: color 0.3s ease;
            display: inline-block;
            margin-top: 5px;
            border-bottom: 1px solid transparent;
        }

        .discord-box a:hover {
            color: #fff;
            border-bottom-color: rgba(255, 255, 255, 0.5);
        }

        /* İndirme Butonu */
        .download-btn {
            display: none;
            margin-top: 40px;
            width: 100%;
            padding: 18px;
            background-color: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .download-btn:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.15);
        }

        /* Durum Metni */
        .status-text {
            margin-top: 25px;
            font-size: 0.8rem;
            height: 20px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>JindexNova</h1>
            <p>Secured Software Portal</p>
        </div>

        <div class="separator"></div>

        <div class="input-group">
            <input type="password" id="accessKey" placeholder="Enter Access Key" oninput="validate()">
            
            <div class="status-text" id="status"></div>

            <div class="discord-box">
                Don't have a key? Join our community for assistance:<br>
                <a href="https://discord.gg/zeCeDV9FrF" target="_blank">discord.gg/zeCeDV9FrF</a>
            </div>
        </div>

        <a href="https://drive.google.com/uc?export=download&id=1vDG8e11l53Fid78PKjnLpasq8Kem6q-w" id="downloadBtn" class="download-btn">Initialize Download</a>
        
    </div>

    <script>
        function validate() {
            const input = document.getElementById('accessKey').value;
            const btn = document.getElementById('downloadBtn');
            const status = document.getElementById('status');
            const inputField = document.getElementById('accessKey');
            
            // Senin belirlediğin şifre (Aynı Kalıyor)
            const secureKey = "QeRT88JINDEX0929"; 

            if(input === secureKey) {
                btn.style.display = "block";
                status.style.color = "#aaa"; // Yumuşak gri onay rengi
                status.innerText = "Key validated. Starting download pipeline...";
                inputField.style.borderColor = "rgba(255, 255, 255, 0.3)";
                inputField.style.background = "rgba(255, 255, 255, 0.05)";
            } else if(input.length > 0) {
                btn.style.display = "none";
                status.style.color = "#888"; // Yumuşak hata rengi (Sert kırmızı değil)
                status.innerText = "Invalid key structure. Please retry.";
                inputField.style.borderColor = "rgba(255, 255, 255, 0.1)";
            } else {
                status.innerText = "";
            }
        }
    </script>
</body>
</html>
