<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JindexNova | Terminal Access</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .container {
            width: 480px;
            padding: 40px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #333;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.1);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00ff41;
            margin-bottom: 10px;
        }

        .system-status {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
        }

        .input-group {
            margin: 30px 0;
        }

        input[type="password"] {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
            transition: border 0.3s ease;
        }

        input[type="password"]:focus {
            border-color: #00ff41;
        }

        .download-btn {
            display: none;
            width: 100%;
            padding: 15px;
            background: #00ff41;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .download-btn:hover {
            background: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .status-text {
            margin-top: 15px;
            font-size: 0.7rem;
            height: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border-color: #00ff41;
            border-style: solid;
        }
        .top-left { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
        .top-right { top: -2px; right: -2px; border-width: 2px 2px 0 0; }
        .bottom-left { bottom: -2px; left: -2px; border-width: 0 0 2px 2px; }
        .bottom-right { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <div class="header">
            <h1>JindexNova</h1>
            <div class="system-status">Authorization Required</div>
        </div>

        <div class="input-group">
            <input type="password" id="accessKey" placeholder="Enter License Key" oninput="validate()">
        </div>

        <a href="https://drive.google.com/uc?export=download&id=1vDG8e11l53Fid78PKjnLpasq8Kem6q-w" id="downloadBtn" class="download-btn">Initialize Transfer</a>
        
        <div id="status" class="status-text"></div>
    </div>

    <script>
        function validate() {
            const input = document.getElementById('accessKey').value;
            const btn = document.getElementById('downloadBtn');
            const status = document.getElementById('status');
            
            // İstediğin yeni şifre
            const secureKey = "QeRT88JINDEX0929"; 

            if(input === secureKey) {
                btn.style.display = "block";
                status.style.color = "#00ff41";
                status.innerText = "Access Granted - Ready for Transfer";
                document.getElementById('accessKey').style.borderColor = "#00ff41";
            } else if(input.length > 0) {
                btn.style.display = "none";
                status.style.color = "#ff0000";
                status.innerText = "Invalid Credential";
            } else {
                status.innerText = "";
            }
        }
    </script>
</body>
</html>
