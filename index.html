<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JindexNova | Terminal Access</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #00ff41;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Matrix Canvas Arka Plan */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .container {
            width: 500px;
            padding: 50px;
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid #00ff41;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            text-align: center;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .header {
            margin-bottom: 35px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00ff41;
        }

        .system-status {
            font-size: 0.75rem;
            color: #888;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .input-group {
            margin: 25px 0;
        }

        input[type="password"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ff41;
            padding: 18px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.1);
        }

        input[type="password"]:focus {
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3), inset 0 0 10px rgba(0, 255, 65, 0.1);
        }

        .discord-link {
            display: block;
            margin-top: 15px;
            font-size: 0.7rem;
            color: #888;
            text-decoration: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .discord-link a {
            color: #00ff41;
            text-decoration: none;
            font-weight: bold;
        }

        .discord-link a:hover {
            color: #fff;
            text-shadow: 0 0 10px #fff;
        }

        .download-btn {
            display: none;
            margin-top: 30px;
            width: 100%;
            padding: 18px;
            background: #00ff41;
            color: #000;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s;
            border: none;
        }

        .download-btn:hover {
            background: #fff;
            box-shadow: 0 0 30px #fff;
        }

        .status-text {
            margin-top: 20px;
            font-size: 0.75rem;
            height: 20px;
            text-transform: uppercase;
        }

        /* Köşe Süslemeleri */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #00ff41;
            border-style: solid;
        }
        .top-left { top: -3px; left: -3px; border-width: 3px 0 0 3px; }
        .top-right { top: -3px; right: -3px; border-width: 3px 3px 0 0; }
        .bottom-left { bottom: -3px; left: -3px; border-width: 0 0 3px 3px; }
        .bottom-right { bottom: -3px; right: -3px; border-width: 0 3px 3px 0; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="container">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <div class="header">
            <h1>JINDEX NOVA</h1>
            <div class="system-status">SECURE ACCESS GATEWAY</div>
        </div>

        <div class="input-group">
            <input type="password" id="accessKey" placeholder="ENCRYPTED KEY" oninput="validate()">
            <div class="discord-link">
                if you don't know the password join: <br>
                <a href="https://discord.gg/zeCeDV9FrF" target="_blank">discord.gg/zeCeDV9FrF</a>
            </div>
        </div>

        <a href="https://drive.google.com/uc?export=download&id=1vDG8e11l53Fid78PKjnLpasq8Kem6q-w" id="downloadBtn" class="download-btn">INITIATE DOWNLOAD</a>
        
        <div id="status" class="status-text"></div>
    </div>

    <script>
        // Matrix Rain Animation
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 35);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Validation Logic
        function validate() {
            const input = document.getElementById('accessKey').value;
            const btn = document.getElementById('downloadBtn');
            const status = document.getElementById('status');
            
            const secureKey = "QeRT88JINDEX0929"; 

            if(input === secureKey) {
                btn.style.display = "block";
                status.style.color = "#00ff41";
                status.innerText = "ACCESS GRANTED - PIPELINE OPEN";
                document.getElementById('accessKey').style.borderColor = "#fff";
            } else if(input.length > 0) {
                btn.style.display = "none";
                status.style.color = "#ff0000";
                status.innerText = "AUTHENTICATION FAILURE";
            } else {
                status.innerText = "";
            }
        }
    </script>
</body>
</html>
