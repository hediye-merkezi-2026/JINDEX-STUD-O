<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Storage | JindexNova</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: #f8f9fa;
            color: #212529;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,1) 0%, rgba(235,238,241,1) 100%);
            z-index: -1;
        }

        .main-portal {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            padding: 60px 45px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background: #f1f3f5;
            border-radius: 24px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon svg {
            width: 32px;
            fill: #adb5bd;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1c1e;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 0.95rem;
            color: #6c757d;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        input[type="password"] {
            width: 100%;
            padding: 20px;
            background: #f8f9fa;
            border: 2px solid transparent;
            border-radius: 22px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            color: #212529;
            margin-bottom: 10px;
        }

        input[type="password"]:focus {
            background: #ffffff;
            border-color: #dee2e6;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }

        .download-action {
            display: none;
            width: 100%;
            padding: 20px;
            background: #212529;
            color: #ffffff;
            text-decoration: none;
            border-radius: 22px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .download-action:hover {
            background: #000000;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .support-area {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid #f1f3f5;
            font-size: 0.85rem;
            color: #adb5bd;
        }

        .support-area a {
            color: #495057;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-top: 5px;
        }

        #status-hint {
            font-size: 0.8rem;
            margin-top: 12px;
            height: 20px;
            color: #adb5bd;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="main-portal">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
        </div>

        <h1>Dosya Erişimi</h1>
        <p>Paylaşılan kütüphane dosyalarını indirmek için lütfen size özel erişim anahtarını girin.</p>

        <input type="password" id="key" placeholder="Erişim Anahtarı" oninput="verify()">
        <div id="status-hint"></div>

        <a href="https://drive.google.com/uc?export=download&id=1NWqb1aB2NmGXDpBwh-hL69YopGRHVPDc" id="dlBtn" class="download-action">Güvenli İndirmeyi Başlat</a>

        <div class="support-area">
            Anahtarınız yoksa topluluğumuza katılın: <br>
            <a href="https://discord.gg/zeCeDV9FrF" target="_blank">discord.gg/zeCeDV9FrF</a>
        </div>
    </div>

    <script>
        function verify() {
            const input = document.getElementById('key').value;
            const btn = document.getElementById('dlBtn');
            const hint = document.getElementById('status-hint');
            const master = "QeRT88JINDEX0929";

            if(input === master) {
                btn.style.display = "block";
                hint.innerText = "Anahtar doğrulandı. Bağlantı hazır.";
                hint.style.color = "#495057";
            } else if(input.length > 5) {
                btn.style.display = "none";
                hint.innerText = "Geçersiz güvenlik anahtarı.";
                hint.style.color = "#adb5bd";
            } else {
                btn.style.display = "none";
                hint.innerText = "";
            }
        }
    </script>
</body>
</html>
