<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JindexNova | Secured Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            background-color: #0a0a0a; /* Derin Siyah */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Arka planda yumuşak bir ışık hüzmesi */
        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
        }

        .main-card {
            width: 440px;
            padding: 50px 40px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            backdrop-filter: blur(20px);
            text-align: center;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .logo-area h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .logo-area p {
            font-size: 0.85rem;
            color: #666;
            font-weight: 400;
        }

        .input-section {
            margin: 35px 0;
        }

        input[type="password"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 14px;
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.02);
        }

        .download-btn {
            display: none;
            width: 100%;
            padding: 16px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .download-btn:hover {
            background-color: #e5e5e5;
            transform: scale(1.02);
        }

        .discord-footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #555;
        }

        .discord-footer a {
            color: #999;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .discord-footer a:hover {
            color: #ffffff;
        }

        #status-msg {
            font-size: 0.75rem;
            margin-top: 15px;
            height: 15px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="logo-area">
            <h1>JindexNova</h1>
            <p>Enterprise Software Verification</p>
        </div>

        <div class="input-section">
            <input type="password" id="passInput" placeholder="Security Token" oninput="checkPass()">
            <div id="status-msg"></div>
        </div>

        <a href="https://drive.google.com/uc?export=download&id=1vDG8e11l53Fid78PKjnLpasq8Kem6q-w" id="dlButton" class="download-btn">Verify & Download</a>

        <div class="discord-footer">
            Need a token? <br>
            <a href="https://discord.gg/zeCeDV9FrF" target="_blank">Join JINDEX STUDIO Support</a>
        </div>
    </div>

    <script>
        function checkPass() {
            const input = document.getElementById('passInput');
            const btn = document.getElementById('dlButton');
            const msg = document.getElementById('status-msg');
            
            // Senin şifren
            const masterKey = "QeRT88JINDEX0929"; 

            if(input.value === masterKey) {
                btn.style.display = "block";
                msg.style.color = "#888";
                msg.innerText = "Token accepted. Secure link established.";
                input.style.borderColor = "rgba(255, 255, 255, 0.4)";
            } else if(input.value.length > 0) {
                btn.style.display = "none";
                msg.innerText = "Waiting for valid token...";
            } else {
                msg.innerText = "";
            }
        }
    </script>
</body>
</html>
